# Production note:
# Replace the placeholder SMTP and recipient values below with envsubst,
# Docker secrets, or your deployment platform's secret management.
global:
  resolve_timeout: 5m
  smtp_smarthost: "localhost:587"
  smtp_from: "alerts@sis.edu"
  smtp_auth_username: ""
  smtp_auth_password: ""
  smtp_require_tls: false

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"
  routes:
    - match:
        severity: "critical"
      receiver: "critical"
      repeat_interval: 1h

receivers:
  - name: "default"
    email_configs:
      - to: "admin@sis.edu"
        headers:
          Subject: "[SIS Alert] {{ .GroupLabels.alertname }}"
        text: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Started: {{ .StartsAt }}
          {{ end }}

  - name: "critical"
    email_configs:
      - to: "admin@sis.edu"
        headers:
          Subject: "[SIS CRITICAL] {{ .GroupLabels.alertname }}"
        text: |
          CRITICAL ALERT - Immediate action required!
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Started: {{ .StartsAt }}
          {{ end }}

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
