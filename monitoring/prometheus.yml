global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "sis-production"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: "sis-api"
    static_configs:
      - targets: ["api:4000"]
    metrics_path: "/ops/metrics/prometheus"
    scrape_interval: 10s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
