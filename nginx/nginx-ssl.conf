# ─────────────────────────────────────────────────────────────────────────────
# 地平线 SIS — nginx HTTPS 生产配置模板
#
# 使用方式:
#   1. 将本文件复制为 nginx/nginx.conf（替换原有 HTTP 配置）
#   2. 填写 server_name（替换 sis.example.edu）
#   3. 挂载 TLS 证书到容器（Let's Encrypt 或学校证书）
#   4. docker compose --profile ops up -d nginx
#
# Let's Encrypt 快速获取证书（在宿主机上运行）:
#   certbot certonly --standalone -d sis.example.edu
#   证书位置: /etc/letsencrypt/live/sis.example.edu/
# ─────────────────────────────────────────────────────────────────────────────

events {
  worker_connections 1024;
}

http {
  upstream api {
    server api:4000;
    keepalive 32;
  }

  upstream web {
    server web:3000;
    keepalive 32;
  }

  # 限流配置
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth_rl:10m rate=10r/m;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
  gzip_min_length 1000;

  # ── HTTP → HTTPS 重定向 ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name sis.example.edu;          # ← 替换为实际域名

    # Let's Encrypt ACME 验证（certbot renew 需要）
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS 主服务 ────────────────────────────────────────────────────────
  server {
    listen 443 ssl;
    http2 on;
    server_name sis.example.edu;          # ← 替换为实际域名

    # TLS 证书（Let's Encrypt 路径）
    ssl_certificate     /etc/letsencrypt/live/sis.example.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sis.example.edu/privkey.pem;

    # 如果使用学校签发的证书，替换为：
    # ssl_certificate     /etc/ssl/sis/sis.crt;
    # ssl_certificate_key /etc/ssl/sis/sis.key;

    # TLS 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── 健康检查（不计入限流）─────────────────────────────────────────
    location = /health {
      proxy_pass http://api;
      proxy_set_header Host $host;
      access_log off;
    }

    # ── Prometheus 指标（仅内网可访问）──────────────────────────────
    location = /ops/metrics/prometheus {
      proxy_pass http://api;
      proxy_set_header Host $host;
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      deny all;
    }

    # ── 认证端点（严格限流）─────────────────────────────────────────
    location ~ ^/auth/(login|register|forgot-password) {
      limit_req zone=auth_rl burst=5 nodelay;
      limit_req_status 429;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API 端点 ────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_limit burst=50 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # ── 无前缀 API 路由（NestJS 根路径）────────────────────────────
    location ~ ^/(admin|students|auth|registration|faculty|advising|governance|notifications|ops)/ {
      limit_req zone=api_limit burst=50 nodelay;
      proxy_pass http://api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # ── Next.js Web 应用 ─────────────────────────────────────────
    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      # Next.js HMR WebSocket（生产环境无需但不影响）
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # ── 静态资源缓存 ─────────────────────────────────────────────
    location /_next/static/ {
      proxy_pass http://web;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }
  }
}
