# ─────────────────────────────────────────────────────────────────────────────
# 地平线 SIS — 完整服务编排
#
# 快速启动（首次）:
#   cp .env.example .env          # 填写真实密钥
#   docker compose up -d --build
#
# 更新代码后重建:
#   docker compose up -d --build api web
# ─────────────────────────────────────────────────────────────────────────────

name: sis

services:
  # ── PostgreSQL 数据库 ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-sis_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sis-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── NestJS API ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-sis_db}?schema=public
      JWT_SECRET:   ${JWT_SECRET:-change-me-in-production}
      API_PORT:     4000
      WEB_URL:      ${WEB_URL:-http://localhost:3000}
      CSRF_ALLOWED_ORIGINS: ${WEB_URL:-http://localhost:3000}
      LOGIN_RATE_LIMIT_WINDOW_MS:   600000
      LOGIN_RATE_LIMIT_MAX_ATTEMPTS: 8
      LOGIN_RATE_LIMIT_LOCK_MS:     900000
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@horizon-sis.local}
    ports:
      - "${API_PORT:-4000}:4000"
    networks:
      - sis-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/ops/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Next.js Web ──────────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # 浏览器端 API 地址 —— 必须是外部可访问的地址
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL:              http://api:4000   # 服务端 SSR 使用内部地址
      NEXT_PUBLIC_API_URL:  ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NODE_ENV:             production
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - sis-net

  # ── PostgreSQL 自动备份（每日 pg_dump） ───────────────────────────────────
  postgres-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-sis_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SCHEDULE: ${BACKUP_SCHEDULE:-@daily}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
      BACKUP_KEEP_WEEKS: ${BACKUP_KEEP_WEEKS:-4}
      BACKUP_KEEP_MONTHS: ${BACKUP_KEEP_MONTHS:-6}
      HEALTHCHECK_PORT: 8080
      POSTGRES_EXTRA_OPTS: "--clean --if-exists"
    volumes:
      - pgbackups:/backups
    networks:
      - sis-net

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: sis-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - sis-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: sis-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-sis-grafana-2026}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_SMTP_ENABLED: ${SMTP_HOST:+true}
      GF_SMTP_HOST: ${SMTP_HOST:-}
      GF_SMTP_USER: ${SMTP_USER:-}
      GF_SMTP_PASSWORD: ${SMTP_PASS:-}
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM:-admin@sis.edu}
      GF_ALERTING_ENABLED: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - sis-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: sis-alertmanager
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    networks:
      - sis-net

  nginx:
    image: nginx:1.25-alpine
    container_name: sis-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - web
    networks:
      - sis-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
  pgbackups:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  sis-net:
    driver: bridge
